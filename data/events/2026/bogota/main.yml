name: "2026-bogota" # The name of the event. Four digit year with the city name in lower-case, with no spaces.
year: "2026" # The year of the event. Make sure it is in quotes.
city: "bogota" # The displayed city name of the event. Capitalize it.
event_twitter: "DevopsdaysB" # Change this to the twitter handle for your event such as devopsdayschi or devopsdaysmsp
description: "DevOpsDays Bogotá 2026: El epicentro de la evolución tecnológica. Únete al evento donde la Inteligencia Artificial y la cultura DevOps convergen para transformar organizaciones. Conéctate con líderes globales, domina herramientas de vanguardia y diseña hoy el futuro de la ingeniería de software." # Edit this to suit your preferences
ga_tracking_id: "" # If you have your own Google Analytics tracking ID, enter it here. Example: "UA-74738648-1"

# All dates are in unquoted 2026-MM-DDTHH:MM:SS+TZ:TZ, like this:
#   variable: 2019-01-04T00:00:00+02:00
#   variable: 2019-01-05T23:59:59+02:00
# Note: we allow 2026-MM-DD for backward compatibility, but it can lead to unexpected behaviors (like your event disappearing from the front page during your last day)

startdate: 2026-10-23T08:00:00-05:00  # The start date of your event. Leave blank if you don't have a venue reserved yet.
enddate:  2026-10-23T19:00:00-05:00 # The end date of your event. Leave blank if you don't have a venue reserved yet.


# Leave CFP dates blank if you don't know yet, or set all three at once.
cfp_date_start: 2026-04-24T17:30:00-05:00  # start accepting talk proposals.
cfp_date_end: 2026-09-15T23:59:00-05:00  # close your call for proposals.
cfp_date_announce: 2026-09-30T23:59:00-05:00  # inform proposers of status

cfp_link: "https://www.papercall.io/devopsdays-bogota-2026" #if you have a custom link for submitting proposals, add it here. This will control the Propose menu item as well as the "Propose" button.

registration_date_start: 2026-05-01T17:30:00-06:00 # start accepting registration. Leave blank if registration is not open yet. This will make the "Register" button appear on your "Welcome" page.
registration_date_end: 2026-10-01T17:30:00-06:00 # close registration. Leave blank if registration is not open yet. If you set "registration_date_start" you need a value here.

registration_closed: "" #set this to true if you need to manually close registration before your registration end date
registration_link: "" # If you have a custom registration link, enter it here. This will control the Registration menu item as well as the "Register" button.

# Location
#
coordinates: "4.6231126,-74.0780256" # The coordinates of your city. Get Latitude and Longitude of a Point: http://itouchmap.com/latlong.html
location: "Bogotá Centro de Convenciones Compensar" # Defaults to city, but you can make it the venue name.
#
location_address: "Av. Carrera 68 # 49A-47, Bogotá, Colombia." #Optional - use the street address of your venue. This will show up on the welcome page if set. Also used by the event_map shortcode!

# Optional - Social badges
# These can be used in the body of any page via matching shortcodes. See sample:  https://devopsdays.org/events/2025-denver/welcome/
event_social_linkedin: "https://linkedin.com/company/DevopsdaysB" # Change this to the url to your Linkedin group, company, or page.
event_social_slack: "https://join.slack.com/t/DevopsdaysB/custom_shared_invite_url" # Change this to your slack invite link.
event_social_listserv: "https://lists.devopsdays.org/subscription?custom_listserv_invite_url" # Change this to your mailing list subscription form url.
event_social_twitter: "DevopsdaysB" # Change this to the twitter handle for your event such as devopsdayschi or devopsdaysmsp
event_social_mastodon: "https://mastodon.social/@DevopsdaysB" # Change this to url to your mastodon page
event_social_bsky: "https://bsky.app/profile/DevopsdaysB.bsky.social" # Change this to url to your bluesky page
event_social_youtube: "DevopsdaysB" # Change this to the youtube channel handle for your event such as devopsdaysrox


# Social Share Buttons
# Optional: Specify which social share buttons to display on event pages.
# If not specified, defaults to all: ["email", "twitter", "facebook", "linkedin"]
# Valid values: "email", "twitter", "facebook", "linkedin"
# Example: social_shares: ["email", "linkedin"]  # Only show email and LinkedIn share buttons
social_shares: # ["email", "twitter", "facebook", "linkedin"]

nav_elements: # List of pages you want to show up in the navigation of your page.
  - name: Spanish
    url: "https://devopsdaysbogota.org"
  - name: propose
  - name: location
  - name: registration
 # - name: program
 # - name: speakers
  - name: sponsor
  - name: contact
  - name: conduct
# - name: example
#   icon: "map-o" # This is a font-awesome icon that will display on small screens. Choose at http://fontawesome.io/icons/
#   url: http://mycfp.com # The url setting is optional, and only if you want the navigation to link off-site


# These are the same people you have on the mailing list and Slack channel.
team_members: # Name is the only required field for team members.
  - name: "Laura Caceres"
    employer: "Epam/Neoris"
    bio: "Laura Caceres Lider con una amplia experiencia en la gestión de proyectos de transformación digital y adopción de DevOps, Le gusta investigar, sobre tendencias relacionadas con el rendimiento de las aplicaciones, la percepción del usuario y cómo impactan en la experiencia digital. hizo parte del equipo organizador del primer DevOpsDays en Latinoamérica para la cuidad de Bogotá y este año también hará parte del equipo organizador DevOpsDays Bogotá 2021."
    image: "laura.jpg"
    twitter: "@amapolita177"
  - name: "Rafael Martinez"
    employer: "Cbs"
    bio: "Rafael Martinez es un entusiasta y ferviente defensor de las prácticas DevOps e instructor líder en DevOps y eventos relacionados con la tecnología, Rafael es responsable de desarrollar estrategias para la automatización de la cadena de suministro de software, hizo parte del equipo organizador del primer DevOpsDays en Latinoamérica para la cuidad de Bogotá y este año también hará parte del equipo organizador DevOpsDays Bogotá 2021."
    image: "rafael.jpg"
    twitter: "@rafaelMartAng"
  - name: "Alvaro Ruiz"
    employer: "Entrepreneur"
    image: "alvaro.jpg"
    bio: "Emprendedor ferviente y amante de las prácticas ágiles, DevOps y automatización. Con una pasión innegable por la tecnología, ha sido un motor impulsor en la promoción y adopción de estas metodologías en su comunidad. Como Coorganizador de DevOpsDays Bogotá, Álvaro canaliza su energía y conocimiento para fomentar la colaboración y el intercambio de ideas en el ámbito tecnológico, contribuyendo así al crecimiento y la innovación en el sector."
    twitter: ""
organizer_email: "bogota@devopsdays.org" # Put your organizer email address here

