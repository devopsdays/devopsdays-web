team_members:
  - name: "Don Luchini"
    image: "donluchini.jpg"
    bio: "Don Luchini is a Boston-based engineer and architect with a passion for automation, teaching, learning, presentation, and community. In addition to organizing DevOpsDays Boston, he also helps organize the monthly [Boston DevOps meetup](https://meetup.com/boston-devops). In his infinite spare time, he teaches Uechi-ryu karate, operates amateur radio as KC1YEK, loves hiking, and is an enjoyer of local coffee, beer, and music."
    github: whoiscarmine
    website: https://hardwarehacks.org
  - name: "Carmine Granucci"
    image: "carminegranucci.jpg"
    bio: "Carmine Granucci is a Boston-based IT operations leader who has spent his career turning reactive support teams into proactive ones across healthcare technology and higher education. He is currently Director of IT Operations at Vinfen, a health and human services nonprofit, and serves as Treasurer of the Boston DevOps Network. He came up through BBS boards and the early web and never really left, which probably explains why every machine in his homelab is named after a Transformer. When he is not working, he is an Arlington Town Meeting Member, a serious coffee drinker, a craft beer hobbyist, and a lifelong Red Sox fan."
    linkedin: https://www.linkedin.com/in/carminegranucci/
    github: whoiscarmine
    website: https://carminegranucci.com/
  - name: "Josh"
    bio: "Not much is known about Josh, other than he tends to show up, support the mission, not say much, and disappear into the night when no longer required."

