location_address: "SC-401, 9301 - Santo Antonio de Lisboa, Florianópolis - SC, 88050-001"

event_social_linkedin: "https://www.linkedin.com/company/devopsdaysfln/" # Change this to the url to your Linkedin group, company, or page.
event_social_youtube: "devopsdaysfloripa" # Change this to the youtube channel handle for your event such as devopsdayschi or devopsdaysmsp. Exclude the "@" symbol.
event_social_instagram: "https://www.instagram.com/devopsdaysfln" # Instagram profile URL for the event.

