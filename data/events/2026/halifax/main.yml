  - name: "Seif Elbayomi"
    image: "seif-elbayomi.jpg"
    bio: "Seif Elbayomi is a Software Developer at VTScada, co-founder of DevOpsDays Halifax Co-operative Ltd., and the 2024 One to Watch recipient from Digital Nova Scotia. Beyond software development, he has taken on teaching, customer support, outreach, and content creation, showing the kind of agility and ownership that goes beyond a typical engineering role. He takes pride in strong work ethic, cares deeply about tech education and making it accessible to everyone, and is passionate about digital transformation. Outside of tech, he is also a soccer referee in Nova Scotia, where he gets the chance to give back to the community and to the game that helped shape who he is."    
