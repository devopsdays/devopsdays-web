name: "2026-recife" # The name of the event. Four digit year with the city name in lower-case, with no spaces.
year: "2026" # The year of the event. Make sure it is in quotes.
city: "Recife" # The displayed city name of the event. Capitalize it.
event_twitter: "devopsdaysrec" # Change this to the twitter handle for your event such as devopsdayschi or devopsdaysmsp
description: "DevOpsDays Recife!" # Edit this to suit your preferences
ga_tracking_id: "UA-36355678-5" # If you have your own Google Analytics tracking ID, enter it here. Example: "UA-74738648-1"
event_logo: "logo.jpg"
masthead_background: "background.jpg"

# All dates are in unquoted YYYY-MM-DDTHH:MM:SS+TZ:TZ, like this:
#   variable: 2019-01-04T00:00:00+02:00
#   variable: 2019-01-05T23:59:59+02:00
# Note: we allow YYYY-MM-DD for backward compatibility, but it can lead to unexpected behaviors (like your event disappearing from the front page during your last day)

startdate: 2026-12-12T00:10:00-03:00
enddate: 2026-12-12T18:00:00-03:00

# Leave CFP dates blank if you don't know yet, or set all three at once.
cfp_date_start: "2026-04-01T00:00:00-03:00" # start accepting talk proposals.
cfp_date_end: "2026-08-30T23:59:59-03:00" # close your call for proposals.
cfp_date_announce: "2026-09-15T00:00:00-03:00" # inform proposers of status

cfp_open: "true"
cfp_link: "https://talks.devopsdays.org/devopsdays-recife-2026/" #if you have a custom link for submitting proposals, add it here. This will control the Propose menu item as well as the "Propose" button.

registration_date_start: "" # start accepting registration. Leave blank if registration is not open yet
registration_date_end: "" # close registration. Leave blank if registration is not open yet

registration_closed: "" #set this to true if you need to manually close registration before your registration end date
registration_link: "" # If you have a custom registration link, enter it here. This will control the Registration menu item as well as the "Register" button.

# Location
#
coordinates: "" # The coordinates of your city. Get Latitude and Longitude of a Point: http://itouchmap.com/latlong.html
location: "Recife" # Defaults to city, but you can make it the venue name.
location_address: "" #Optional - use the street address of your venue. This will show up on the welcome page if set.


nav_elements: # List of pages you want to show up in the navigation of your page.
#   icon: "" deprecated - This is a font-awesome icon that will display on small screens. Choose at http://fontawesome.io/icons/
 - name: local
   url: /events/2026-recife/local
