name: "2026-rio-de-janeiro" # The name of the event. Four digit year with the city name in lower-case, with no spaces.
year: "2026" # The year of the event. Make sure it is in quotes.
city: "Rio de Janeiro" # The displayed city name of the event. Capitalize it.
event_twitter: "devopsdayrio" # Change this to the twitter handle for your event such as devopsdayschi or devopsdaysmsp
description: "Devopsdays is coming to Rio de Janeiro!" # Edit this to suit your preferences
ga_tracking_id: "" # If you have your own Google Analytics tracking ID, enter it here. Example: "UA-74738648-1"

# All dates are in unquoted 2026-MM-DDTHH:MM:SS+TZ:TZ, like this:
#   variable: 2019-01-04T00:00:00+02:00
#   variable: 2019-01-05T23:59:59+02:00
# Note: we allow 2026-MM-DD for backward compatibility, but it can lead to unexpected behaviors (like your event disappearing from the front page during your last day)

startdate: 2026-08-15T09:00:00-03:00 # The start date of your event. Leave blank if you don't have a venue reserved yet.
enddate:  2026-08-15T18:00:00-03:00 # The end date of your event. Leave blank if you don't have a venue reserved yet.

timezone: "America/Sao_Paulo"
timeoffset: "-0300"
# Leave CFP dates blank if you don't know yet, or set all three at once.
cfp_date_start:  2026-02-18T00:00:00-03:00
cfp_date_end:  2026-05-18T00:00:00-03:00
cfp_date_announce:  2026-06-13T09:00:00-03:00
