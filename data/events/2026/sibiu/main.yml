name: "2026-sibiu" # The name of the event. Four digit year with the city name in lower-case, with no spaces.
year: "2026" # The year of the event. Make sure it is in quotes.
city: "Sibiu" # The displayed city name of the event. Capitalize it.
description: "Devopsdays is coming to Sibiu!" # Edit this to suit your preferences
ga_tracking_id: "" # If you have your own Google Analytics tracking ID, enter it here. Example: "UA-74738648-1"
event_logo: "/assets/2026-sibiu/logo.png"
sharing_image: "logo.png"
masthead_background: "sibiu-header.png"

# All dates are in unquoted 2026-MM-DDTHH:MM:SS+TZ:TZ, like this:
#   variable: 2019-01-04T00:00:00+02:00
#   variable: 2019-01-05T23:59:59+02:00
# Note: we allow 2026-MM-DD for backward compatibility, but it can lead to unexpected behaviors (like your event disappearing from the front page during your last day)

startdate:  2026-05-27T00:00:00+03:00
enddate:  2026-05-29T00:00:00+03:00

# Leave CFP dates blank if you don't know yet, or set all three at once.
cfp_date_start: 2026-01-01T00:00:00+03:00 # start accepting talk proposals.
cfp_date_end: 2026-03-01T00:00:00+03:00 # close your call for proposals.
cfp_date_announce:  # inform proposers of status

#cfp_link: "https://docs.google.com/forms/d/e/1FAIpQLSewuE-FJZQwCYnrZc--SmxwHLwmbYqwZl8nLWD2IdFSqPoahQ/viewform" #if you have a custom link for submitting proposals, add it here. This will control the Propose menu item as well as the "Propose" button.

registration_date_start: # start accepting registration. Leave blank if registration is not open yet. This will make the "Register" button appear on your "Welcome" page.
registration_date_end: # close registration. Leave blank if registration is not open yet. If you set "registration_date_start" you need a value here.

registration_closed: "" #set this to true if you need to manually close registration before your registration end date
registration_link: "" # If you have a custom registration link, enter it here. This will control the Registration menu item as well as the "Register" button.

# Location

location: "Ramada Hotel - Sibiu" # Defaults to city, but you can make it the venue name.

# Optional - Social badges
# These can be used in the body of any page via matching shortcodes. See sample:  https://devopsdays.org/events/2025-denver/welcome/
event_social_linkedin: "https://www.linkedin.com/company/devopsdays-sibiu/" # Change this to the url to your Linkedin group, company, or page.
event_social_youtube: "https://www.youtube.com/@DevOpsDaysRomania" # Change this to the youtube channel handle for your event such as devopsdaysrox

nav_elements: # List of pages you want to show up in the navigation of your page.
  #  - name: propose
  - name: location
  - name: tickets
    url: "https://tickets.devopsdays.org/devopsdays-sibiu/2026/"
  - name: program
  - name: speakers
  - name: sponsor
  - name: contact
  - name: conduct
  - name: legal
